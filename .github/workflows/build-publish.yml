name: Build and Publish package

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm
          registry-url: https://registry.npmjs.org
          provenance: true

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: projects/angular-material-date-time-range-picker

      - name: Build Angular library
        run: npm run lib:build

      - name: Publish package to NPM
        working-directory: ./dist/angular-material-date-time-range-picker
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current-version }}
          name: Release v${{ steps.version.outputs.current-version }}
          generate_release_notes: true
          draft: false
          prerelease: false
